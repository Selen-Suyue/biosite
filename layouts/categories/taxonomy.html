{{- define "main" -}}
  {{- $paginator := .Paginate (.Pages.ByDate.Reverse) -}}
  <header class="taxonomy-header taxonomy-list-header">
    <p class="taxonomy-kicker">Category</p>
    <h1>{{ .Title }}</h1>
    <p>共 {{ len .Pages }} 篇文章</p>
  </header>
  <div class="blog-list" aria-label="{{ .Title }}分类下的文章">
    {{- range $paginator.Pages -}}
      {{- partial "post.html" . -}}
    {{- end -}}
  </div>
  {{- partial "pagination.html" . -}}
{{- end -}}
