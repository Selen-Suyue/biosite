baseURL = 'https://selen-suyue.github.io/biosite/'
locale = 'zh-CN'
defaultContentLanguage = 'zh-cn'
title = "Selen's Blog"

theme = 'reimu'
disableKinds = ['rss']


[outputs]
home = ["HTML", "SearchIndex"]

[outputFormats.SearchIndex]
mediaType = "application/json"
baseName = "search-index"
isPlainText = true
notAlternative = true

[pagination]
pagerSize = 6

# Keep article navigation consistent with the newest-first home page.
[page]
nextPrevInSectionSortOrder = "desc"

# enable search algolia

# enable code highlight
[markup.highlight]
guessSyntax = true
noClasses = false

# enable math katex
[markup.goldmark.extensions.passthrough]
enable = true
delimiters.block = [["\\[", "\\]"], ["$$", "$$"]]
delimiters.inline = [["\\(", "\\)"], ["$", "$"]]
